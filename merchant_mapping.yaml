# merchant_mapping.yaml
#
# Mapping reel -> fictif pour anonymiser un export CSV de carte de credit.
# Couvre les 163 marchands uniques presents dans site/data/data1.csv.
#
# Style des noms fictifs : melange Turc, Malaisien, US (anglais).
# Regle : un marchand reel a UN seul remplacant, et toujours le meme.
# Si Tim Hortons apparait 106 fois en source, Coffee Gossip apparait 106 fois en sortie.
#
# Le bloc `headers` corrige les en-tetes du fichier (accents francais).
# Le bloc `categories` corrige les categories (accents francais aussi).

# -----------------------------------------------------------------------------
# Headers : accents francais corrects
# -----------------------------------------------------------------------------
headers:
  "Categorie": "Catégorie"
  "Numero de Carte": "Numéro de Carte"

# -----------------------------------------------------------------------------
# Categories : accents francais corrects (les autres restent identiques)
# -----------------------------------------------------------------------------
